<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龙族聊天 - Dragon Chat</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        🐉 龙族聊天
        <button class="theme-toggle" id="theme-btn" title="暗色模式">🌙</button>
      </div>
      <div class="sidebar-content">
        <!-- Group chat entry -->
        <div class="sidebar-item active" id="group-chat-entry">
          <div class="sidebar-item-avatar" style="background:#7b68ee">🐉</div>
          <div class="sidebar-item-info">
            <div class="sidebar-item-name">龙族聊天群</div>
            <div class="sidebar-item-desc">全员在线，畅所欲言</div>
          </div>
        </div>

        <!-- Private chat list -->
        <div id="private-chat-list"></div>
      </div>

      <!-- User Profile -->
      <div id="user-profile"></div>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <div class="main-content" id="main-content">
      <div id="group-chat-area"></div>
      <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:16px">
        🐉 连接中...
      </div>
    </div>

    <!-- Mobile Bottom Tab Bar -->
    <div class="mobile-tab-bar" id="mobile-tab-bar">
      <div class="mobile-tab active" data-tab="group" id="tab-group">
        <span class="mobile-tab-icon">🐉</span>
        <span class="mobile-tab-label">群聊</span>
      </div>
      <div class="mobile-tab" data-tab="chats" id="tab-chats">
        <span class="mobile-tab-icon">💬</span>
        <span class="mobile-tab-label">私聊</span>
        <span class="badge-dot" id="badge-dot" style="display:none"></span>
      </div>
      <div class="mobile-tab" data-tab="menu" id="tab-menu">
        <span class="mobile-tab-icon">☰</span>
        <span class="mobile-tab-label">菜单</span>
      </div>
    </div>
  </div>

  <!-- Image preview overlay -->
  <div class="image-preview-overlay" id="image-preview-overlay" style="display:none">
    <img id="image-preview-img" src="" alt="preview">
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/user-profile.js"></script>
  <script src="js/group-chat.js"></script>
  <script src="js/private-chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
